version: 2

models:
  - name: stg_trips
    description: Cleaned and standardized taxi trip records from raw Yellow Taxi data.
    columns:
      - name: pickup_datetime
        description: Trip pickup timestamp.
        tests:
          - not_null
      - name: dropoff_datetime
        description: Trip dropoff timestamp.
        tests:
          - not_null
      - name: pickup_date
        description: Date of pickup, used for partitioning and date joins.
        tests:
          - not_null
      - name: pickup_location_id
        description: TLC pickup zone ID.
        tests:
          - not_null
      - name: dropoff_location_id
        description: TLC dropoff zone ID.
        tests:
          - not_null
      - name: trip_distance
        description: Trip distance in miles.
        tests:
          - not_null
      - name: total_amount
        description: Total trip amount charged to the passenger.
        tests:
          - not_null

  - name: stg_zones
    description: Standardized TLC taxi zone lookup table.
    columns:
      - name: location_id
        description: TLC taxi zone location ID.
        tests:
          - not_null
          - unique
      - name: borough
        description: NYC borough or area for the taxi zone.
        tests:
          - not_null
      - name: zone_name
        description: Taxi zone name.
        tests:
          - not_null

